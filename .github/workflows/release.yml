name: Release vaultlier

# Publishes the `vaultlier` package to npm through Trusted Publishing when a
# GitHub Release is published. Create a release whose tag matches the package
# version (e.g. tag `v0.1.0` for version 0.1.0).
on:
  release:
    types: [published]
  # Allows a manual run from the Actions tab for re-publishing/testing.
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm Trusted Publishing/OIDC

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Install dependencies
        run: npm ci

      - name: Verify (lint, types, tests, build)
        run: npx turbo run lint check-types test build --filter=vaultlier

      - name: Check npm version
        id: npm-version
        shell: bash
        run: |
          PACKAGE_NAME="$(node -p "require('./packages/vaultlier/package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./packages/vaultlier/package.json').version")"

          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "${PACKAGE_NAME}@${PACKAGE_VERSION} is already published; skipping npm publish."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm with trusted publishing
        if: steps.npm-version.outputs.exists != 'true'
        run: npm publish --workspace=vaultlier --access public
