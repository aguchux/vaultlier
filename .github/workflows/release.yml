name: Release vaultlierjs

# Publishes the `vaultlierjs` package to npm with provenance when a GitHub
# Release is published. Create a release whose tag matches the package version
# (e.g. tag `v0.1.0` for version 0.1.0).
on:
  release:
    types: [published]
  # Allows a manual run from the Actions tab for re-publishing/testing.
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # required for npm provenance attestation

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify (lint, types, tests, build)
        run: npx turbo run lint check-types test build --filter=vaultlierjs

      - name: Publish to npm with provenance
        run: npm publish --workspace=vaultlierjs --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
