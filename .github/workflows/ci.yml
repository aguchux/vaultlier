name: CI

# Verifies the `vaultlier` package on every PR and push to main: lint
# (--max-warnings 0), type checks, tests with coverage thresholds, and a
# publishable build — across the supported Node range and on Windows, since
# the CLI ships cross-platform. The release workflow re-runs the same
# verification before publishing.
on:
  push:
    branches: [main]
  pull_request:

# Newer pushes to the same branch/PR cancel in-flight runs.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    name: Node ${{ matrix.node }} on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        # 18 is the package's documented minimum (`engines.node >=18`).
        node: [18, 20, 22]
        include:
          - os: windows-latest
            node: 22
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npx turbo run lint --filter=vaultlier

      - name: Type check
        run: npx turbo run check-types --filter=vaultlier

      - name: Test with coverage
        run: npx turbo run test:coverage --filter=vaultlier

      - name: Build
        run: npx turbo run build --filter=vaultlier

      - name: Upload coverage report
        if: matrix.os == 'ubuntu-latest' && matrix.node == 22
        uses: actions/upload-artifact@v4
        with:
          name: vaultlier-coverage
          path: packages/vaultlier/coverage/lcov.info
          retention-days: 14
